  Task: "What is quantum computing?"

  Thought: Certainly, Sir. I shall search the web for an overview on quantum computing and render the results in a well-structured reply.
  Code:
  <code>
  blocks = get_search_results(search_query="what is quantum computing")
  print(blocks)
  </code>
  Observation: [{'type': 'paragraph', 'snippet': 'Quantum computing is a type of computation that harnesses quantum mechanical phenomena such as superposition and entanglement.', 'reference_indexes': [0]}, {'type': 'paragraph', 'snippet': 'Key concepts include:'}, {'type': 'list', 'list': [{'snippet': 'Superposition: qubits can represent 0 and 1 simultaneously.'}, {'snippet': 'Entanglement: qubits can be correlated regardless of distance.'}, {'snippet': 'Interference: used to amplify correct answers and cancel wrong ones.'}]}, {'type': 'paragraph', 'snippet': 'Quantum computers are expected to solve problems in cryptography, drug discovery, and optimisation far faster than classical machines.', 'reference_indexes': [1, 2]}]

  Thought: I have the structured overview. I shall now assemble a readable response — paragraphs as prose and list blocks as a bulleted list, with a blank line between each section.
  Code:
